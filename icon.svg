<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="foot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e0e7ff"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="100" height="100" rx="20"/>
  <g transform="translate(15, 18)">
    <!-- Main foot shape -->
    <path d="M35 0 C15 0, 0 15, 0 35 C0 55, 15 70, 35 70 C55 70, 70 55, 70 35 C70 15, 55 0, 35 0 Z" fill="url(#foot)" opacity="0.95"/>
    <!-- Heel -->
    <ellipse cx="20" cy="55" rx="12" ry="8" fill="#6366f1" opacity="0.3"/>
    <!-- Toes -->
    <ellipse cx="25" cy="15" rx="8" ry="6" fill="#6366f1" opacity="0.2"/>
    <ellipse cx="40" cy="12" rx="7" ry="5" fill="#6366f1" opacity="0.2"/>
    <ellipse cx="52" cy="15" rx="6" ry="5" fill="#6366f1" opacity="0.2"/>
    <ellipse cx="60" cy="20" rx="5" ry="4" fill="#6366f1" opacity="0.2"/>
    <!-- Arch line -->
    <path d="M20 45 Q35 60, 50 45" stroke="#6366f1" stroke-width="3" fill="none" opacity="0.4"/>
    <!-- Shine effect -->
    <ellipse cx="25" cy="25" rx="15" ry="10" fill="white" opacity="0.3"/>
  </g>
</svg>
